<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Desktop Pet</title>
  <link rel="stylesheet" href="css/pet.css">
</head>
<body>
  <div id="pet-container">
    <!-- Speech Bubble -->
    <div id="bubble" class="bubble-hidden">
      <span id="bubble-close" title="关闭气泡">✕</span>
      <div id="bubble-text"></div>
      <div class="bubble-arrow"></div>
    </div>

    <!-- Pet Character (image sprite) -->
    <div id="pet-body" class="mood-happy">
      <img id="pet-sprite" src="assets/pet/idle.png" alt="">
    </div>

    <!-- Shadow -->
    <div id="pet-shadow"></div>
  </div>

  <script src="js/pet.js"></script>
</body>
</html>
