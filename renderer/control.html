<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>桌宠控制台</title>
  <link rel="stylesheet" href="css/control.css">
</head>
<body>
  <div id="control-container">
    <!-- Header -->
    <div id="control-header">桌宠控制台</div>

    <!-- Persona Panel -->
    <div class="panel">
      <div class="panel-title">当前人格</div>
      <select id="persona-select"></select>
      <div id="persona-desc"></div>
      <div id="persona-actions">
        <button class="secondary-btn" id="btn-new-persona" type="button">新建人格</button>
        <button class="secondary-btn" id="btn-edit-persona" type="button">编辑当前</button>
        <button class="secondary-btn" id="btn-reset-persona" type="button">恢复默认</button>
      </div>
      <div id="persona-editor" class="hidden">
        <input id="persona-name" type="text" maxlength="40" placeholder="人格名称">
        <input id="persona-description" type="text" maxlength="160" placeholder="描述，例如：适合写代码和排错">
        <textarea id="persona-prompt" maxlength="4000" placeholder="输入人格提示词，例如：你是一个冷静、直接、擅长排错的桌面伙伴……"></textarea>
        <div id="persona-editor-actions">
          <button class="primary-btn" id="btn-save-persona" type="button">保存</button>
          <button class="secondary-btn" id="btn-cancel-persona" type="button">取消</button>
          <button class="danger-btn" id="btn-delete-persona" type="button">删除</button>
        </div>
        <div id="persona-editor-error"></div>
      </div>
    </div>

    <!-- Mood Panel -->
    <div class="panel">
      <div class="panel-title">当前心情</div>
      <div id="mood-display">
        <span id="mood-emoji"></span>
        <span id="mood-label">--</span>
      </div>
      <div id="mood-last-reason"></div>
      <div class="panel-title" style="margin-top:12px;">手动切换</div>
      <div id="mood-buttons">
        <button class="mood-btn" data-mood="happy">开心</button>
        <button class="mood-btn" data-mood="excited">兴奋</button>
        <button class="mood-btn" data-mood="bored">无聊</button>
        <button class="mood-btn" data-mood="sleepy">困倦</button>
        <button class="mood-btn" data-mood="caring">关心</button>
        <button class="mood-btn auto-btn" id="btn-auto">⟳ 恢复自动</button>
      </div>
    </div>

    <!-- Behavior Panel -->
    <div class="panel">
      <div class="panel-title">行为</div>
      <label class="setting-row" for="rolling-toggle">
        <span>
          <span class="setting-title">自动滚动</span>
          <span class="setting-desc">按圆周长随机滚动一到三圈</span>
        </span>
        <input id="rolling-toggle" type="checkbox">
      </label>
      <button class="secondary-btn full-width-btn" id="btn-reset-pet-position" type="button">回到初始位置</button>
    </div>

    <!-- API Panel -->
    <div class="panel">
      <div class="panel-title">模型 / API</div>
      <div id="api-form">
        <label class="field-label" for="api-profile-select">已保存配置</label>
        <select id="api-profile-select"></select>

        <label class="field-label" for="api-profile-name">配置名称</label>
        <input id="api-profile-name" type="text" maxlength="40" placeholder="例如：百炼 Turbo">

        <label class="field-label" for="api-provider-select">服务商</label>
        <select id="api-provider-select"></select>

        <label class="field-label" for="api-base-url">Base URL</label>
        <input id="api-base-url" type="text" placeholder="https://.../v1">

        <label class="field-label" for="api-model">模型</label>
        <input id="api-model" type="text" placeholder="qwen-turbo">

        <label class="field-label" for="api-key">API Key</label>
        <input id="api-key" type="password" placeholder="留空则保留已有 Key">

        <label class="setting-row compact" for="api-stream-toggle">
          <span>
            <span class="setting-title">流式输出</span>
            <span class="setting-desc">聊天窗口逐字显示</span>
          </span>
          <input id="api-stream-toggle" class="switch-input" type="checkbox">
        </label>

        <label class="setting-row compact" for="api-thinking-toggle">
          <span>
            <span class="setting-title">思考模式</span>
            <span class="setting-desc">百炼 qwen-turbo 默认关闭</span>
          </span>
          <input id="api-thinking-toggle" class="switch-input" type="checkbox">
        </label>

        <div id="api-actions">
          <button class="secondary-btn" id="btn-test-api" type="button">测试连接</button>
          <button class="primary-btn" id="btn-save-api" type="button">保存 API</button>
        </div>
        <div id="api-profile-actions">
          <button class="secondary-btn" id="btn-new-api-profile" type="button">新建配置</button>
          <button class="danger-btn" id="btn-delete-api-profile" type="button">删除配置</button>
        </div>
        <div id="api-status"></div>
      </div>
    </div>

    <!-- Chat History -->
    <div class="panel panel-grow">
      <div class="panel-title">最近对话</div>
      <div id="chat-history"></div>
    </div>

    <!-- Memory -->
    <div class="panel">
      <div class="panel-title">记忆</div>
      <div id="memory-summary">--</div>
      <button id="btn-clear-memory" type="button">清空记忆</button>
    </div>
  </div>

  <script src="js/control.js"></script>
</body>
</html>
