<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Desktop Pet</title>
  <link rel="stylesheet" href="css/pet.css">
</head>
<body>
  <div id="pet-container">
    <!-- Speech Bubble -->
    <div id="bubble" class="bubble-hidden">
      <div id="bubble-text"></div>
      <div class="bubble-arrow"></div>
    </div>

    <!-- Pet Character (CSS drawn) -->
    <div id="pet-body" class="mood-happy">
      <div class="pet-face">
        <div class="eye left-eye"></div>
        <div class="eye right-eye"></div>
        <div class="mouth"></div>
      </div>
      <div class="pet-cheek left-cheek"></div>
      <div class="pet-cheek right-cheek"></div>
    </div>

    <!-- Shadow -->
    <div id="pet-shadow"></div>
  </div>

  <script src="js/pet.js"></script>
</body>
</html>
